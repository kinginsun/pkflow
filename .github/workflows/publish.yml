name: Publish to PyPI

# Trigger: push a version tag like v0.1.0 or v0.1.0a1
on:
  push:
    tags:
      - "v*"

env:
  # Opt into Node.js 24 for JS-based actions (Node 20 deprecated by GH Actions)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    # Use a GitHub Environment named "pypi" so you can require manual approval
    environment:
      name: pypi
      url: https://pypi.org/project/pkflow/
    permissions:
      # MUST have id-token for OIDC trusted publishing — no token secret needed
      id-token: write
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No "password" — auth happens via OIDC against the trusted publisher
        # you registered on PyPI.

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release with built artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
